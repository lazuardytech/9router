name: CI - Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npx eslint . --max-warnings 0 || true

      - name: Install test dependencies
        run: |
          cd /tmp && npm install vitest
          cd tests && npm install

      - name: Run tests
        run: |
          cd tests
          NODE_PATH=/tmp/node_modules /tmp/node_modules/.bin/vitest run --reporter=verbose || true

      - name: Build application
        run: npm run build

      - name: Test build artifacts
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed: .next directory not found"
            exit 1
          fi
          echo "Build successful"

      - name: Report status
        if: always()
        run: |
          echo "CI pipeline completed"
          echo "Lint: Check output above"
          echo "Tests: Check output above"
          echo "Build: Check output above"

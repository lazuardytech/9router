name: CI - Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run lint
        run: pnpm exec eslint . || true

      - name: Install test dependencies
        run: |
          cd /tmp && pnpm add vitest
          cd $GITHUB_WORKSPACE/tests && pnpm install --no-frozen-lockfile

      - name: Run tests
        run: |
          cd $GITHUB_WORKSPACE/tests
          NODE_PATH=/tmp/node_modules /tmp/node_modules/.bin/vitest run --reporter=verbose || true

      - name: Build application
        run: pnpm run build

      - name: Test build artifacts
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed: .next directory not found"
            exit 1
          fi
          echo "Build successful"

      - name: Report status
        if: always()
        run: |
          echo "CI pipeline completed"
          echo "Lint: Check output above"
          echo "Tests: Check output above"
          echo "Build: Check output above"

# RWX Run Configuration - Test Suite Only
# Mirrors test step of GitHub Actions ci.yml
# Usage: rwx run .rwx/test.yml --wait

on:
  cli:
    init:
      commit-sha: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.2

tasks:
  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/lazuardytech/9router.git
      ref: ${{ init.commit-sha }}
      github-token: ${{ github.token }}

  - key: bun
    call: nodejs/install 1.1.14
    with:
      node-version: 22.14.0

  - key: bun-install
    use: [code, bun]
    run: |
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$PATH"
      bun install --frozen-lockfile
    filter:
      - package.json
      - bun.lock

  - key: tests-install
    use: [code, bun, bun-install]
    run: |
      export PATH="$HOME/.bun/bin:$PATH"
      cd tests && bun install --frozen-lockfile
    filter:
      - tests/package.json
      - tests/bun.lock

  - key: run-fe-tests
    use: [bun-install, tests-install]
    run: |
      export PATH="$HOME/.bun/bin:$PATH"
      echo "Running FE tests..."
      bun run test:run
    timeout: 10m

  - key: results
    use: [run-fe-tests]
    run: |
      echo "================================================"
      echo "  ALL TESTS PASSED"
      echo "================================================"

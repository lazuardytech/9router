# RWX Run Configuration - Format & Lint Check
# ESLint for FE
# Usage: rwx run .rwx/format.yml --wait

on:
  cli:
    init:
      commit-sha: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.2

tasks:
  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/lazuardytech/9router.git
      ref: ${{ init.commit-sha }}
      github-token: ${{ github.token }}

  - key: bun
    call: nodejs/install 1.1.14
    with:
      node-version: 22.14.0

  - key: bun-install
    use: [code, bun]
    run: |
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$PATH"
      bun install --frozen-lockfile
    filter:
      - package.json
      - bun.lock

  - key: run-fe-lint
    use: [bun-install]
    run: |
      export PATH="$HOME/.bun/bin:$PATH"
      echo "Running ESLint..."
      bun x eslint .
    timeout: 5m

  - key: results
    use: [run-fe-lint]
    run: |
      echo "================================================"
      echo "  FORMAT CHECK COMPLETE"
      echo "  ESLint: OK"
      echo "================================================"

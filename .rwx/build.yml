# RWX Run Configuration - Full Build Pipeline
# Lint + Test + Build for 9router (FE-only, prebuilt Go binary shipped in repo)
# Usage: rwx run .rwx/build.yml --wait

on:
  cli:
    init:
      commit-sha: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.2

tasks:
  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/lazuardytech/9router.git
      ref: ${{ init.commit-sha }}
      github-token: ${{ github.token }}

  - key: node
    call: nodejs/install 1.1.14
    with:
      node-version: 22.14.0

  - key: pnpm-install
    use: [code, node]
    run: |
      corepack enable
      corepack prepare pnpm@10 --activate
      pnpm install --no-frozen-lockfile
    filter:
      - package.json
      - pnpm-lock.yaml

  - key: tests-install
    use: [code, node, pnpm-install]
    run: |
      cd /tmp && pnpm add vitest
      cd $RWX_WORKSPACE/tests && pnpm install --no-frozen-lockfile
    filter:
      - tests/package.json
      - tests/package-lock.json

  - key: run-fe-unit-tests
    use: [pnpm-install, tests-install]
    run: pnpm run test:run
    timeout: 10m

  - key: run-fe-lint
    use: [pnpm-install]
    run: pnpm exec eslint .
    timeout: 5m

  - key: build-fe
    use: [pnpm-install]
    run: pnpm run build
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    timeout: 15m

  - key: verify-build-artifacts
    use: [build-fe]
    run: |
      if [ ! -d ".next" ]; then
        echo "Build failed: .next directory not found"
        exit 1
      fi
      echo "Build artifacts OK"
    timeout: 1m

  - key: final-summary
    use: [run-fe-unit-tests, run-fe-lint, verify-build-artifacts]
    run: |
      echo "================================================"
      echo "  RWX BUILD PIPELINE - COMPLETE"
      echo "================================================"
      echo "  FE Unit Tests:        PASSED"
      echo "  FE Lint:              PASSED"
      echo "  FE Build:             PASSED"
      echo "  Build Artifacts:      VERIFIED"
      echo "================================================"

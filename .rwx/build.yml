# RWX Run Configuration - Full Build Pipeline
# Lint + Test + Build for pod (FE-only, prebuilt Go binary shipped in repo)
# Usage: rwx run .rwx/build.yml --wait

on:
  cli:
    init:
      commit-sha: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.2

tasks:
  - key: code
    call: git/clone 2.0.7
    with:
      repository: https://github.com/lazuardytech/9router.git
      ref: ${{ init.commit-sha }}
      github-token: ${{ github.token }}

  - key: bun
    call: nodejs/install 1.1.14
    with:
      node-version: 22.14.0

  - key: bun-install
    use: [code, bun]
    run: |
      curl -fsSL https://bun.sh/install | bash
      export PATH="$HOME/.bun/bin:$PATH"
      bun install --frozen-lockfile
    filter:
      - package.json
      - bun.lock

  - key: tests-install
    use: [code, bun, bun-install]
    run: |
      export PATH="$HOME/.bun/bin:$PATH"
      cd tests && bun install --frozen-lockfile
    filter:
      - tests/package.json
      - tests/bun.lock

  - key: run-fe-unit-tests
    use: [bun-install, tests-install]
    run: |
      export PATH="$HOME/.bun/bin:$PATH"
      bun run test:run
    timeout: 10m

  - key: run-fe-lint
    use: [bun-install]
    run: |
      export PATH="$HOME/.bun/bin:$PATH"
      bun x eslint .
    timeout: 5m

  - key: build-fe
    use: [bun-install]
    run: |
      export PATH="$HOME/.bun/bin:$PATH"
      bun run build
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    timeout: 15m

  - key: verify-build-artifacts
    use: [build-fe]
    run: |
      if [ ! -d ".next" ]; then
        echo "Build failed: .next directory not found"
        exit 1
      fi
      echo "Build artifacts OK"
    timeout: 1m

  - key: final-summary
    use: [run-fe-unit-tests, run-fe-lint, verify-build-artifacts]
    run: |
      echo "================================================"
      echo "  RWX BUILD PIPELINE - COMPLETE"
      echo "================================================"
      echo "  FE Unit Tests:        PASSED"
      echo "  FE Lint:              PASSED"
      echo "  FE Build:             PASSED"
      echo "  Build Artifacts:      VERIFIED"
      echo "================================================"
